packages:
  - apps/*
  - packages/*

allowBuilds:
  esbuild: true # downloads platform-specific binary
  sharp: true # compiles native modules
  workerd: true # for cloudflare related packages
  lefthook: true # Use lefthook

blockExoticSubdeps: true

catalogMode: strict
catalogs:
  devtool:
    '@tanstack/eslint-plugin-query': 5.91.4
    '@tanstack/eslint-plugin-router': 1.161.4
    '@commitlint/cli': 20.4.4
    '@commitlint/config-conventional': 20.4.4
    '@secretlint/secretlint-rule-preset-recommend': 11.3.1
    lefthook: 2.1.4
    secretlint: 11.3.1
    knip: 5.86.0
    typescript: 5.9.3
    vite: npm:@voidzero-dev/vite-plus-core@0.1.13
    vite-plus: 0.1.13
    vitest: 4.1.0 # npm:@voidzero-dev/vite-plus-core@0.1.13
    wrangler: 4.76.0
  web:
    '@cloudflare/vite-plugin': 1.30.0
    '@cloudflare/vitest-pool-workers': 0.13.3
    '@hono/react-renderer': 1.0.1
    '@tailwindcss/vite': 4.2.2
    '@tanstack/react-query': 5.90.21
    '@tanstack/react-router': 1.166.7
    '@tanstack/router-plugin': 1.166.7
    '@types/react': 19.2.14
    '@types/react-dom': 19.2.3
    hono: 4.12.7
    react: 19.2.4
    react-dom: 19.2.4
    tailwindcss: 4.2.2
    vite-ssr-components: 0.5.2
cleanupUnusedCatalogs: true

minimumReleaseAge: 10080 # 7days
minimumReleaseAgeExclude:
  - '@typescript/*'
  - '@cloudflare/*'
  - workerd
  - wrangler
  - miniflare
  - '@voidzero-dev/*'
  - '@oxc-project/*'
  - vite
  - rolldown
  - '@rolldown/*'
  - '@oxlint/*'
  - '@oxlint-tsgolint/*'
  - '@oxfmt/*'
  - tinyexec
  - tailwindcss
  - '@tailwindcss/*'

# For `vite-plus`
overrides:
  vite: 'catalog:devtool'
  vitest: 'catalog:devtool'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'

strictDepBuilds: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - semver@6.3.1
